<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- CSP задаётся через session.webRequest.onHeadersReceived в electron/main/index.ts,
         а не через meta-тег: при загрузке через file:// Chromium трактует 'self' как null
         origin, что блокирует type="module" скрипты. Безопасность обеспечена contextIsolation
         + sandbox + nodeIntegration:false на уровне BrowserWindow. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FloorCalc</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
